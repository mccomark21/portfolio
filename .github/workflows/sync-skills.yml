name: Sync Skills

on:
  workflow_run:
    workflows: ["Ingest Repository"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only run on successful ingest, or on manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync skills manifest
        id: sync
        run: node .github/scripts/sync-skills.mjs

      - name: Commit and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add content/skills.json
          git diff --cached --quiet && { echo "skills.json unchanged — nothing to do."; exit 0; }

          BRANCH="sync/skills-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "sync: update skills.json from post frontmatter"
          git push origin "$BRANCH"

          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "sync: update skills.json" \
            --body "Automated skills manifest update from post \`techStack\` fields.

          **Categories updated:** ${{ steps.sync.outputs.category_count }}  
          **Posts scanned:** ${{ steps.sync.outputs.post_count }}" \
            --label "automation,skills" 2>/dev/null || \
          echo "PR already exists or no new changes."
